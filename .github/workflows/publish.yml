name: Publish to npm

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find release tag
        id: tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "Error: No tags found in repository"
            exit 1
          fi

          VERSION="${TAG#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Warning: Tag $TAG does not match package.json version $PACKAGE_VERSION"
            echo "Checking out tag $TAG to ensure correct version is published"
            git checkout "$TAG"
          fi

          FINAL_VERSION=$(node -p "require('./package.json').version")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Publishing tag: $TAG (package.json version: $FINAL_VERSION)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Check versions
        run: |
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
